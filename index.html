<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mode Bridge - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Mode Bridge DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://mode-bridge.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #f7f6f1;
  --surface: #ffffff;
  --surface-soft: #fbfaf6;
  --ink: #171714;
  --muted: #65645d;
  --faint: #9b988d;
  --line: rgba(23, 23, 20, 0.1);
  --line-strong: rgba(23, 23, 20, 0.18);
  --accent: #b59b00;
  --accent-dark: #927d00;
  --accent-soft: rgba(181, 155, 0, 0.12);
  --shadow: 0 30px 80px -44px rgba(23, 23, 20, 0.42);
  --max: 1060px;
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

html {
  overflow-x: hidden;
}

body {
  min-height: 100dvh;
  margin: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(620px 360px at 50% -120px, rgba(181, 155, 0, 0.13), transparent 72%),
    linear-gradient(180deg, #fbfaf6 0%, var(--bg) 100%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

.topbar {
  width: min(var(--max), calc(100% - 32px));
  min-height: 68px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 18px;
  flex: 0 0 auto;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-size: 1.02rem;
  font-weight: 760;
  letter-spacing: 0;
}

.brand img {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
  flex: 0 0 auto;
}

.brand span {
  white-space: nowrap;
}

.nav {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-left: 14px;
}

.nav a {
  color: var(--muted);
  font-size: 0.93rem;
  font-weight: 540;
  white-space: nowrap;
  transition: color 0.16s ease;
}

.nav a:hover {
  color: var(--ink);
}

.spacer {
  flex: 1 1 auto;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 17px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.56);
  color: var(--ink);
  font-size: 0.91rem;
  font-weight: 700;
  white-space: nowrap;
  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.85) inset;
  transition: border-color 0.16s ease, color 0.16s ease, transform 0.16s ease;
}

.ghost:hover {
  border-color: rgba(181, 155, 0, 0.46);
  color: var(--accent-dark);
  transform: translateY(-1px);
}

.stage {
  width: min(var(--max), calc(100% - 32px));
  margin: 0 auto;
  flex: 1 1 auto;
  min-height: 0;
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 28px;
  padding: 8px 0 14px;
  text-align: center;
}

.hero {
  display: grid;
  justify-items: center;
  gap: 14px;
}

h1 {
  margin: 0;
  font-size: clamp(2.72rem, 7vw, 5rem);
  line-height: 0.98;
  font-weight: 820;
  letter-spacing: 0;
}

.sub {
  width: min(100%, 610px);
  margin: 0;
  color: var(--muted);
  font-size: clamp(1rem, 1.7vw, 1.18rem);
  line-height: 1.55;
}

.sub strong {
  color: var(--ink);
  font-weight: 760;
  box-shadow: inset 0 -0.5em 0 var(--accent-soft);
}

.app-card {
  width: min(100%, 590px);
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.88)),
    var(--surface);
  box-shadow: var(--shadow);
}

.route {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 44px minmax(0, 1fr);
  align-items: stretch;
  gap: 12px;
}

.leg {
  min-width: 0;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 15px;
  background: var(--surface-soft);
  text-align: left;
}

.label {
  display: block;
  color: var(--faint);
  font-size: 0.7rem;
  font-weight: 780;
  letter-spacing: 0.08em;
  line-height: 1;
  text-transform: uppercase;
}

.chip {
  min-height: 34px;
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  color: var(--ink);
  font-size: 1.05rem;
  font-weight: 800;
}

.chip img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex: 0 0 auto;
}

.chip span {
  min-width: 0;
  overflow-wrap: anywhere;
}

.switch {
  width: 44px;
  height: 44px;
  align-self: center;
  display: grid;
  place-items: center;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  background: #fff;
  color: var(--accent-dark);
  cursor: pointer;
  box-shadow: 0 12px 28px -20px rgba(23, 23, 20, 0.55);
  transition: background 0.16s ease, border-color 0.16s ease, transform 0.18s ease;
}

.switch span {
  font-size: 1.13rem;
  line-height: 1;
}

.switch:hover {
  border-color: rgba(181, 155, 0, 0.5);
  background: var(--accent-soft);
  transform: translateY(-1px);
}

.primary {
  min-height: 54px;
  margin-top: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 15px;
  background: var(--accent);
  color: #fff;
  font-size: 1.04rem;
  font-weight: 820;
  box-shadow: 0 18px 34px -25px rgba(146, 125, 0, 0.9);
  transition: background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
}

.primary:hover {
  background: var(--accent-dark);
  transform: translateY(-1px);
  box-shadow: 0 22px 38px -25px rgba(146, 125, 0, 0.95);
}

.footer {
  flex: 0 0 auto;
  padding: 8px 16px 20px;
  color: var(--faint);
  font-size: 0.84rem;
  font-weight: 560;
  text-align: center;
}

@media (max-width: 720px) {
  .topbar {
    width: min(100% - 28px, var(--max));
    min-height: 62px;
    gap: 12px;
  }

  .nav {
    display: none;
  }

  .ghost {
    min-height: 36px;
    padding: 0 14px;
    font-size: 0.88rem;
  }

  .stage {
    width: min(100% - 28px, var(--max));
    gap: 22px;
    padding: 4px 0 10px;
  }

  h1 {
    font-size: clamp(2.55rem, 16vw, 4rem);
  }

  .sub {
    max-width: 34ch;
    font-size: 1rem;
    line-height: 1.48;
  }

  .app-card {
    padding: 14px;
    border-radius: 20px;
  }

  .route {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .leg {
    padding: 12px 13px;
  }

  .switch {
    width: 42px;
    height: 42px;
    justify-self: center;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .primary {
    min-height: 52px;
    margin-top: 12px;
  }

  .footer {
    padding-bottom: 14px;
  }
}

@media (max-width: 390px) {
  .topbar {
    width: min(100% - 24px, var(--max));
  }

  .brand {
    font-size: 0.98rem;
  }

  .ghost {
    padding: 0 12px;
  }

  .stage {
    width: min(100% - 24px, var(--max));
    gap: 18px;
  }
}

@media (max-height: 720px) {
  .topbar {
    min-height: 58px;
  }

  .stage {
    gap: 18px;
  }

  .hero {
    gap: 10px;
  }

  h1 {
    font-size: clamp(2.42rem, 9vh, 4.3rem);
  }

  .app-card {
    padding: 14px;
  }

  .footer {
    padding-bottom: 12px;
  }
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Mode Bridge</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Mode Bridge</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Mode Bridge &mdash; 2026</footer>
</body>
</html>
